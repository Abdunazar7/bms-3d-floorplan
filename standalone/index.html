<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>3D Floor Plan — standalone</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1b1d22;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        /* Kiosk WebView: never flash the native tap highlight on any control. */
        -webkit-tap-highlight-color: transparent;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
      ha-card {
        display: block;
        height: 100%;
      }
      ha-3d-floorplan-card {
        --primary-color: #03a9f4;
        --primary-text-color: #eee;
        --card-background-color: #1b1d22;
        --divider-color: #333;
        display: block;
        height: 100%;
      }
      #status {
        position: fixed;
        left: 10px;
        bottom: 10px;
        z-index: 20;
        font-size: 12px;
        color: #ffd7d0;
        background: rgba(60, 24, 24, 0.82);
        padding: 5px 10px;
        border-radius: 8px;
        pointer-events: none;
        display: none; /* shown only on a problem */
      }
      #gear {
        position: fixed;
        right: 10px;
        bottom: 10px;
        z-index: 20;
        font-size: 18px;
        line-height: 1;
        color: #fff;
        background: rgba(20, 22, 26, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 10px;
        padding: 8px 11px;
        cursor: pointer;
        display: none; /* only shown for manual (non-injected) serving */
      }
      #ha-back {
        position: fixed;
        left: 10px;
        top: 10px;
        z-index: 20;
        font: inherit;
        font-size: 13px;
        color: #fff;
        background: rgba(20, 22, 26, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 10px;
        padding: 7px 12px;
        cursor: pointer;
        display: none; /* shown only when Home Assistant serves the page */
      }
      #setup {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
      }
      #setup.open {
        display: flex;
      }
      .box {
        width: min(420px, 90%);
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 18px;
        border-radius: 12px;
        background: #24262a;
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: #eee;
      }
      .box h2 {
        margin: 0;
        font-size: 16px;
      }
      .box p {
        margin: 0;
        font-size: 12px;
        color: #9fb3cc;
      }
      .box input {
        font: inherit;
        padding: 9px 11px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #15171a;
        color: #fff;
      }
      .box .row {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .box button {
        font: inherit;
        padding: 9px 14px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #2e2f34;
        color: #fff;
        cursor: pointer;
      }
      .box button.primary {
        background: #03a9f4;
        border-color: #03a9f4;
      }
    </style>
  </head>
  <body>
    <!--
      Standalone 3D floor plan — runs on its OWN port, separate from Home
      Assistant, so the page can't reach any HA admin/settings.

      TWO WAYS to run it:

      A) AUTOMATIC (recommended) — the 3D Floor Plan integration serves this page
         for you. In Home Assistant: Settings → Devices & Services → 3D Floor Plan
         → Configure, set a "Kiosk server port" (e.g. 8099) and paste a long-lived
         access token (from your HA profile — same account you edit the plan with).
         Then open  http://<home-assistant-host>:<port>/  on any wall tablet. The
         page auto-connects, pulls your saved plan live, and controls devices — no
         copying files, no token entry on the device.

      B) MANUAL — serve this folder yourself:
         1. Copy the built card next to this file:  ha-3d-floorplan-card.js
         2. (Optional, view-only) put an exported plan next to it: plan.json
         3. Serve, e.g.:  python -m http.server 8099
         4. For LIVE control, tap ⚙ and enter your HA URL + a long-lived token.
            It's saved on THIS device only (localStorage). Keep the token private.

      SECURITY: the HA token is powerful, so it is NEVER read from the URL — a
      crafted link can neither set it nor point it at another server. Credentials
      come only from the integration's injected config or this device's ⚙ dialog.
      Optional same-origin resource overrides: ?card=<path> ?plan=<path> (relative
      paths on THIS origin only — remote/data: URLs are rejected).
    -->
    <button id="ha-back" title="Back to Home Assistant">⌂ Home Assistant</button>
    <div id="status">starting…</div>
    <button id="gear" title="Connect to Home Assistant">⚙</button>
    <div id="setup">
      <form class="box" id="setup-form">
        <h2>Connect to Home Assistant</h2>
        <p>Enter your HA base URL and a long-lived access token to control devices
          live. Leave blank for a view-only 3D reference.</p>
        <input id="ha-url" type="url" placeholder="https://homeassistant.local:8123" />
        <input id="ha-token" type="password" placeholder="Long-lived access token" />
        <div class="row">
          <button type="button" id="setup-clear">View-only</button>
          <button type="submit" class="primary">Connect</button>
        </div>
      </form>
    </div>

    <!-- The integration's kiosk server injects window.__HA3D__ here (HA URL +
         token). Served statically, this stays a comment and the page falls back
         to the manual ⚙ setup below. -->
    <!--HA3D_INJECT-->

    <script>
      if (!customElements.get('ha-card')) customElements.define('ha-card', class extends HTMLElement {});
    </script>
    <script type="module">
      const $ = (s) => document.querySelector(s);
      const statusEl = $('#status');
      // Show a message ONLY when something is wrong; stay invisible when all is
      // well (connecting/connected). `show` defaults to false = hidden.
      const setStatus = (t, show = false) => {
        statusEl.textContent = t;
        statusEl.style.display = show ? 'block' : 'none';
      };
      const errMsg = (e) => (e && e.message ? e.message : String(e));

      // Config injected by the HA integration's kiosk server (trusted), if any.
      const inj = window.__HA3D__ && typeof window.__HA3D__ === 'object' ? window.__HA3D__ : null;
      // Served same-origin by HA at a path (e.g. /3d-floorplan-kiosk): reuse the
      // browser's existing HA login instead of an embedded token.
      const useSession = !!(inj && inj.useSession);

      const params = new URLSearchParams(location.search);
      // Same-origin guard for the ?card=/?plan= resource overrides: resolve the
      // value against the page URL exactly as import()/fetch() would, and require
      // the SAME origin. This rejects data:/javascript:/blob: (opaque/other
      // origin), cross-origin absolute URLs, protocol-relative //host, and
      // leading-whitespace/control-char tricks — a raw-string regex could not.
      const sameOrigin = (u) => {
        if (!u) return null;
        try {
          const r = new URL(u, location.href);
          return r.origin === location.origin ? r.href : null;
        } catch {
          return null;
        }
      };
      // Card path: trusted server-provided path first (HA serves the bundle off
      // its own root, not next to this page), then a same-origin ?card= override.
      const cardUrl = (inj && inj.cardUrl) || sameOrigin(params.get('card')) || './ha-3d-floorplan-card.js';
      const planUrl = sameOrigin(params.get('plan')) || './plan.json';

      // --- Credentials ----------------------------------------------------
      // The long-lived token is powerful, so URL query params NEVER carry
      // credentials (a crafted link must not be able to set the token or point
      // it at another host). Credentials come only from:
      //   (1) the integration's injected config (window.__HA3D__), or
      //   (2) this device's ⚙ dialog (localStorage) — a deliberate physical act.
      // A device value (even blank) beats the injected default, so ⚙ "View-only"
      // works even on an injected kiosk.
      let haUrl, token;
      if (useSession) {
        // Same-origin: connect to THIS Home Assistant, authenticate with the
        // logged-in session (below). Nothing secret is embedded in the page.
        haUrl = location.origin;
        token = '';
      } else {
        const lsUrl = localStorage.getItem('ha3d_ha_url'); // null = never set here
        const lsTok = localStorage.getItem('ha3d_token');
        haUrl = (lsUrl !== null ? lsUrl : (inj && inj.haUrl) || '').trim();
        token = (lsTok !== null ? lsTok : (inj && inj.token) || '').trim();
        if (haUrl && !/^https?:\/\//i.test(haUrl)) haUrl = 'https://' + haUrl; // default scheme
      }

      // Session auth: return the HA access token the frontend stored for this
      // origin, refreshing it when near expiry. Distinguishes two failure kinds:
      //   • returns null  → not logged in on this device (a real, terminal state)
      //   • THROWS        → transient (HA restarting / refresh hiccup) → retry.
      // A near-expired token is NEVER returned as-is: sending it would draw an
      // auth_invalid and (in session mode) latch a permanent failure.
      async function getSessionToken() {
        let raw;
        try {
          raw = localStorage.getItem('hassTokens');
        } catch {
          return null;
        }
        if (!raw) return null;
        let t;
        try {
          t = JSON.parse(raw);
        } catch {
          return null;
        }
        if (!t || !t.access_token) return null;
        if ((t.expires || 0) - Date.now() < 60000) {
          // (Near) expired — must refresh before use; any failure is transient.
          if (!t.refresh_token) throw new Error('session expired');
          const r = await fetch('/auth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              grant_type: 'refresh_token',
              refresh_token: t.refresh_token,
              client_id: t.clientId || location.origin + '/',
            }),
          });
          if (!r.ok) throw new Error('token refresh failed: ' + r.status);
          const j = await r.json();
          t.access_token = j.access_token;
          t.expires = Date.now() + (j.expires_in || 1800) * 1000;
          try { localStorage.setItem('hassTokens', JSON.stringify(t)); } catch {}
        }
        return t.access_token;
      }

      // --- Setup dialog ---------------------------------------------------
      const setup = $('#setup');
      // The ⚙ connect button is only for MANUAL folder serving. When the page is
      // served by the integration (injected config), it's never shown.
      if (!inj) $('#gear').style.display = 'block';
      // When Home Assistant serves the kiosk page, offer a way back to HA. Not
      // in the Android app (inj.app) — there's no HA page to return to there.
      if (inj && !inj.app) {
        const back = $('#ha-back');
        back.style.display = 'block';
        back.onclick = () => (location.href = '/');
      }
      $('#gear').onclick = () => {
        $('#ha-url').value = haUrl;
        $('#ha-token').value = token;
        setup.classList.add('open');
      };
      $('#setup-form').onsubmit = (e) => {
        e.preventDefault();
        localStorage.setItem('ha3d_ha_url', $('#ha-url').value.trim());
        localStorage.setItem('ha3d_token', $('#ha-token').value.trim());
        location.reload();
      };
      $('#setup-clear').onclick = () => {
        // Write blanks (not remove) so this device stays view-only even when the
        // server injects a token.
        localStorage.setItem('ha3d_ha_url', '');
        localStorage.setItem('ha3d_token', '');
        location.reload();
      };

      // --- Card, live state + offline cache -------------------------------
      // These are shared with the live client below AND used before/without any
      // socket, so the 3D renders from cache with no network and taps simulate
      // locally. A live connection, when it comes up, overrides both.
      let card, currentPlan = null, lastPlanJson = null;
      let states = {};
      let ws = null;
      let reqId = 10;
      const pending = new Map();
      let pushQueued = false;

      function ensureCard(plan) {
        currentPlan = plan;
        lastPlanJson = JSON.stringify(plan);
        if (card) return card;
        card = document.createElement('ha-3d-floorplan-card');
        card.setConfig({ type: 'custom:ha-3d-floorplan-card', height: '100vh', idleMinutes: 2, plan });
        document.body.appendChild(card);
        return card;
      }

      // Apply a (possibly new) plan to the card. Returns true if it actually
      // changed — used by the live plan-sync poller so edits made in HA (devices
      // added/removed/moved, rooms renamed…) rebuild the 3D without a reload.
      function applyPlan(plan) {
        if (!plan) return false;
        const json = JSON.stringify(plan);
        if (card && json === lastPlanJson) return false; // unchanged
        if (!card) { ensureCard(plan); return true; }
        currentPlan = plan;
        lastPlanJson = json;
        card.setConfig({ type: 'custom:ha-3d-floorplan-card', height: '100vh', idleMinutes: 2, plan });
        return true;
      }

      // Offline cache: after a live sync we stash the plan + last states, so the
      // app opens and shows the 3D with NO network at all (a local demo). Taps
      // then simulate the service locally (callService below) and stick.
      const CACHE_KEY = 'ha3d_cache';
      function cacheSave() {
        try { localStorage.setItem(CACHE_KEY, JSON.stringify({ plan: currentPlan, states })); } catch {}
      }
      function cacheLoad() {
        try { return JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'); } catch { return null; }
      }
      let cacheAt = 0;
      function cacheSaveThrottled() {
        const t = performance.now();
        if (t - cacheAt < 8000) return;
        cacheAt = t;
        cacheSave();
      }

      // Push the current state map into the card (batched to one per frame).
      function pushHass() {
        if (pushQueued || !card) return;
        pushQueued = true;
        requestAnimationFrame(() => {
          pushQueued = false;
          if (card) card.hass = { states: { ...states }, callService, callWS };
        });
      }

      // Send a WebSocket request; rejects immediately if the socket isn't open
      // (so the card's optimistic UI reverts instead of hanging).
      function request(msg) {
        return new Promise((res, rej) => {
          if (!ws || ws.readyState !== WebSocket.OPEN) {
            rej(new Error('socket not open'));
            return;
          }
          const id = ++reqId;
          msg.id = id;
          pending.set(id, { res, rej });
          try {
            ws.send(JSON.stringify(msg));
          } catch (e) {
            pending.delete(id);
            rej(e);
          }
        });
      }
      // Card ↔ HA per-user store (saved projects + edit PIN). Rejects offline.
      const callWS = (msg) => request(msg);

      // Drive a device. Online → real HA service call. Offline → simulate the
      // result on the local state map, so a tap "turns on right there" and stays
      // on (the card's optimistic update never gets a rejection to revert).
      function callService(domain, service, data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          const p = request({ type: 'call_service', domain, service, service_data: data || {} });
          p.catch(() => {});
          return p;
        }
        applyLocalService(domain, service, data);
        cacheSave();
        pushHass();
        return Promise.resolve();
      }

      // A minimal local model of the services the card calls, so offline taps
      // visibly change state: on/off/toggle for lights, switches, covers, locks;
      // hvac mode; and any attributes passed (brightness, colour, temperature…).
      function applyLocalService(domain, service, data) {
        data = data || {};
        const ids = Array.isArray(data.entity_id)
          ? data.entity_id
          : data.entity_id ? [data.entity_id] : [];
        const attrs = { ...data };
        delete attrs.entity_id;
        const offish = (s) => ['off', 'closed', 'locked', 'unavailable', 'unknown', '', undefined, null].includes(s);
        for (const id of ids) {
          const cur = states[id] || { entity_id: id, state: 'off', attributes: {} };
          let ns = null;
          if (service === 'toggle') ns = offish(cur.state) ? 'on' : 'off';
          else if (service === 'turn_on') ns = 'on';
          else if (service === 'turn_off') ns = 'off';
          else if (service === 'open_cover') ns = 'open';
          else if (service === 'close_cover') ns = 'closed';
          else if (service === 'lock') ns = 'locked';
          else if (service === 'unlock') ns = 'unlocked';
          else if (service === 'set_hvac_mode' && attrs.hvac_mode != null) ns = String(attrs.hvac_mode);
          states[id] = {
            ...cur,
            state: ns !== null ? ns : cur.state,
            attributes: { ...(cur.attributes || {}), ...attrs },
          };
        }
      }
      const validPlan = (p) => !!p && Array.isArray(p.floors) && p.floors.length > 0;
      async function fetchFilePlan() {
        try {
          const r = await fetch(planUrl, { cache: 'no-cache' });
          if (r.ok) {
            const p = await r.json();
            if (validPlan(p)) return p;
          }
        } catch {
          /* no plan.json — fine */
        }
        return null;
      }

      // --- Boot -----------------------------------------------------------
      async function boot() {
        try {
          await import(cardUrl);
        } catch (err) {
          setStatus('card load failed: ' + errMsg(err), true);
          return;
        }

        // Offline-first: if a plan was cached from a previous live session, show
        // the 3D immediately with NO network and let taps simulate locally. If a
        // live connection then comes up, it overrides with real states + control.
        const cached = cacheLoad();
        if (cached && validPlan(cached.plan)) {
          ensureCard(cached.plan);
          states = cached.states || {};
          pushHass();
        }

        if (useSession || (haUrl && token)) {
          connectLive();
        } else if (!(cached && validPlan(cached.plan))) {
          const plan = await fetchFilePlan();
          if (plan) ensureCard(plan);
          const hint = inj ? 'log in to Home Assistant' : 'tap ⚙ to connect';
          setStatus((plan ? 'view-only · ' : 'view-only · no plan — ') + hint, true);
        }
      }

      // --- Live Home Assistant WebSocket client ---------------------------
      // states / ws / pending / request / callService / callWS / pushHass are
      // module-scoped above (shared with the offline path). connectLive only
      // drives the socket and updates them live.
      function connectLive() {
        let planLoaded = false;
        let authFailed = false; // a bad token must NOT trigger an endless retry loop
        let syncFails = 0; // consecutive post-auth sync failures → back off
        const wsUrl = haUrl.replace(/^http/, 'ws').replace(/\/+$/, '') + '/api/websocket';
        // The saved plan — pulled from the SAME per-user store the in-app editor
        // writes to, so the kiosk always shows what was last saved in the app.
        async function fetchUserPlan() {
          try {
            const res = await request({ type: 'frontend/get_user_data', key: 'ha3d_floorplans' });
            const data = res && res.value;
            if (!data || !data.projects) return null;
            let id = data.active;
            if (!(id && validPlan(data.projects[id]))) {
              id = Object.keys(data.projects).find((k) => validPlan(data.projects[k]));
            }
            return id ? data.projects[id] : null;
          } catch {
            return null;
          }
        }
        function open() {
          setStatus('connecting…');
          let sock;
          try {
            sock = ws = new WebSocket(wsUrl);
          } catch (e) {
            setStatus('bad HA URL — fix it (⚙)', true);
            return;
          }
          // Ignore callbacks/continuations from a socket that has been superseded
          // by a reconnect, so a stale handler can never send on or close the new
          // socket, nor clobber its status/state.
          const current = () => ws === sock;

          sock.onmessage = async (ev) => {
            if (!current()) return;
            let m;
            try {
              m = JSON.parse(ev.data);
            } catch {
              return;
            }
            if (m.type === 'auth_required') {
              let tk;
              try {
                tk = useSession ? await getSessionToken() : token;
              } catch (e) {
                // Session token temporarily unavailable (HA restarting / refresh
                // hiccup) — reconnect and try again rather than latch a failure.
                if (!current()) return;
                setStatus('waiting for Home Assistant…', true);
                try { sock.close(); } catch {}
                return;
              }
              if (!current()) return;
              if (!tk) {
                authFailed = true;
                setStatus(useSession ? 'log in to Home Assistant first' : 'no token — set one (⚙)', true);
                try { sock.close(); } catch {}
                return;
              }
              sock.send(JSON.stringify({ type: 'auth', access_token: tk }));
            } else if (m.type === 'auth_invalid') {
              authFailed = true;
              setStatus(useSession ? 'Home Assistant login expired — reload the page' : 'auth failed — check the token (⚙)', true);
              try { sock.close(); } catch {}
            } else if (m.type === 'auth_ok') {
              setStatus('connected');
              try {
                const res = await request({ type: 'get_states' });
                if (!current()) return;
                const next = {};
                for (const s of res || []) next[s.entity_id] = s;
                states = next; // rebuild → prunes entities removed since last connect
                syncFails = 0;
                if (!planLoaded) {
                  // Live plan from HA, else an optional plan.json. applyPlan (not
                  // ensureCard) so a live plan replaces any stale cached one shown
                  // at boot.
                  const plan = (await fetchUserPlan()) || (await fetchFilePlan());
                  if (!current()) return;
                  if (plan) {
                    applyPlan(plan);
                    planLoaded = true; // only latch once a REAL plan is shown
                  } else {
                    setStatus('connected · no plan saved for this account', true);
                  }
                }
                pushHass();
                cacheSave(); // stash plan + fresh states for the offline demo
                await request({ type: 'subscribe_events', event_type: 'state_changed' });
              } catch (e) {
                if (!current()) return;
                syncFails++;
                setStatus('live sync failed — retrying…', true);
                try { sock.close(); } catch {}
              }
            } else if (m.type === 'result') {
              const p = pending.get(m.id);
              if (p) {
                pending.delete(m.id);
                m.success ? p.res(m.result) : p.rej(m.error || new Error('call failed'));
              }
            } else if (m.type === 'event' && m.event && m.event.event_type === 'state_changed') {
              const d = m.event.data;
              if (d.new_state) states[d.entity_id] = d.new_state;
              else delete states[d.entity_id];
              pushHass();
              cacheSaveThrottled(); // keep the offline snapshot reasonably fresh
            }
          };
          sock.onclose = () => {
            if (!current()) return;
            pending.forEach((p) => p.rej(new Error('socket closed')));
            pending.clear();
            if (authFailed) {
              setStatus(useSession ? 'Home Assistant login expired — reload the page' : 'auth failed — check the token (⚙)', true);
              return; // don't hammer HA with a wrong token
            }
            // Back off on repeated sync failures so a deterministic error
            // (e.g. a restricted token) doesn't hot-loop; a plain drop retries fast.
            const delay = Math.min(2500 * Math.pow(2, Math.min(syncFails, 5)), 60000);
            setStatus('disconnected — retrying…', true);
            setTimeout(open, delay);
          };
          sock.onerror = () => {
            try {
              sock.close();
            } catch {}
          };
        }
        open();

        // Plan auto-sync: HA has no push event for the saved plan, so poll it
        // and rebuild the 3D only when it actually changed — edits made in HA
        // (devices added / removed / moved, rooms renamed…) appear on the tablet
        // within ~15s, no reload. Skips while offline (fetchUserPlan → null).
        setInterval(async () => {
          if (!ws || ws.readyState !== WebSocket.OPEN || !planLoaded) return;
          const plan = await fetchUserPlan();
          if (plan && applyPlan(plan)) cacheSave(); // also refresh offline snapshot
        }, 15000);
      }

      boot();
    </script>
  </body>
</html>
